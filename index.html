<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ID de Emergencia — Sistema de Gestión</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        * { font-family: 'Inter', system-ui, sans-serif; }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }

        /* Pulse animation for emergency */
        @keyframes emergency-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(220, 38, 38, 0); }
        }
        .emergency-pulse { animation: emergency-pulse 2s infinite; }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fade-in 0.35s ease-out; }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .slide-up { animation: slide-up 0.4s ease-out; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.5s ease-out; }

        /* QR container fix */
        #qr-display canvas, #qr-display img { margin: 0 auto; }
        #qr-emergency canvas, #qr-emergency img { margin: 0 auto; }

        /* Print styles */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; }
        }

        /* Photo upload area */
        .photo-upload {
            border: 2px dashed #cbd5e1;
            transition: all 0.2s;
            cursor: pointer;
        }
        .photo-upload:hover {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        .photo-upload.has-photo {
            border: 2px solid #22c55e;
            background: #f0fdf4;
        }

        /* Tab system */
        .tab-btn.active {
            color: #1e40af;
            border-bottom: 3px solid #1e40af;
            font-weight: 700;
        }

        /* Modal backdrop */
        .modal-backdrop {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
        }

        /* Admin badge glow */
        .admin-glow {
            box-shadow: 0 0 12px rgba(234, 179, 8, 0.4);
        }

        /* Table hover rows */
        .table-row:hover { background: #f8fafc; }

        /* Secure input */
        .secure-input:focus {
            border-color: #eab308;
            box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- ============================================== -->
    <!-- APP CONTAINER                                  -->
    <!-- ============================================== -->
    <div id="app" class="max-w-lg mx-auto min-h-screen relative"></div>

    <!-- Modal Container -->
    <div id="modal-container"></div>

    <script>
    // ====================================================
    // STATE MANAGEMENT
    // ====================================================
    const APP_KEY = 'emergencyID_v3';
    const ADMIN_KEY = 'emergencyID_admin';
    const SESSION_KEY = 'emergencyID_session';

    const State = {
        profiles: [],
        activeProfileIndex: 0,
        isAdminLoggedIn: false,

        load() {
            try {
                const raw = localStorage.getItem(APP_KEY);
                if (raw) {
                    const data = JSON.parse(raw);
                    this.profiles = data.profiles || [];
                    this.activeProfileIndex = data.activeProfileIndex || 0;
                }
                // Check session
                const session = sessionStorage.getItem(SESSION_KEY);
                this.isAdminLoggedIn = session === 'authenticated';
            } catch(e) {
                console.error('Error loading state:', e);
                this.profiles = [];
            }
        },

        save() {
            localStorage.setItem(APP_KEY, JSON.stringify({
                profiles: this.profiles,
                activeProfileIndex: this.activeProfileIndex
            }));
        },

        hasProfiles() { return this.profiles.length > 0; },

        getActive() { return this.profiles[this.activeProfileIndex] || null; },

        getProfileById(id) { return this.profiles.find(p => p.id === id); },

        getProfileIndexById(id) { return this.profiles.findIndex(p => p.id === id); },

        addProfile(profile) {
            profile.id = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
            profile.createdAt = new Date().toISOString();
            this.profiles.push(profile);
            this.activeProfileIndex = this.profiles.length - 1;
            this.save();
            return profile;
        },

        updateProfile(index, data) {
            if (this.profiles[index]) {
                Object.assign(this.profiles[index], data, { updatedAt: new Date().toISOString() });
                this.save();
            }
        },

        deleteProfile(index) {
            this.profiles.splice(index, 1);
            if (this.activeProfileIndex >= this.profiles.length) {
                this.activeProfileIndex = Math.max(0, this.profiles.length - 1);
            }
            this.save();
        }
    };

    // ====================================================
    // ADMIN AUTHENTICATION SYSTEM
    // ====================================================
    const AdminAuth = {
        // Simple hash function for password (SHA-256 simulation via Web Crypto)
        async hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password + '_emergency_salt_2024');
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        },

        async setPassword(password) {
            const hash = await this.hashPassword(password);
            localStorage.setItem(ADMIN_KEY, hash);
            return true;
        },

        async verifyPassword(password) {
            const storedHash = localStorage.getItem(ADMIN_KEY);
            if (!storedHash) return false;
            const hash = await this.hashPassword(password);
            return hash === storedHash;
        },

        hasPassword() {
            return localStorage.getItem(ADMIN_KEY) !== null;
        },

        login() {
            sessionStorage.setItem(SESSION_KEY, 'authenticated');
            State.isAdminLoggedIn = true;
        },

        logout() {
            sessionStorage.removeItem(SESSION_KEY);
            State.isAdminLoggedIn = false;
        },

        isLoggedIn() {
            return State.isAdminLoggedIn;
        },

        async changePassword(currentPass, newPass) {
            const isValid = await this.verifyPassword(currentPass);
            if (!isValid) return { success: false, error: 'Contraseña actual incorrecta' };
            await this.setPassword(newPass);
            return { success: true };
        },

        resetPassword() {
            localStorage.removeItem(ADMIN_KEY);
            this.logout();
        }
    };

    // ====================================================
    // ROUTER — Detects ?view=emergency&id=xxx
    // ====================================================
    function getRoute() {
        const params = new URLSearchParams(window.location.search);
        const view = params.get('view');
        const id = params.get('id');
        const data = params.get('data');
        if (view === 'emergency' && (id || data)) return { view: 'emergency', id, data };
        return { view: 'app' };
    }

    // ====================================================
    // ADMIN LOGIN MODAL
    // ====================================================
    function showLoginModal(onSuccess, mode = 'login') {
        const modalContainer = document.getElementById('modal-container');
        const isSetup = mode === 'setup';
        
        modalContainer.innerHTML = `
            <div class="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4 fade-in" id="login-modal">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden slide-up">
                    <!-- Header -->
                    <div class="bg-gradient-to-r from-amber-500 to-yellow-500 p-5 text-white text-center">
                        <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i data-lucide="${isSetup ? 'shield-plus' : 'lock'}" class="w-8 h-8"></i>
                        </div>
                        <h2 class="text-xl font-bold">${isSetup ? 'Crear Contraseña Admin' : 'Acceso Administrativo'}</h2>
                        <p class="text-amber-100 text-sm mt-1">${isSetup ? 'Protege el acceso a la gestión de datos' : 'Ingresa tu contraseña para continuar'}</p>
                    </div>

                    <!-- Body -->
                    <div class="p-5">
                        <form id="login-form" class="space-y-4">
                            ${isSetup ? `
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-1.5">Nueva contraseña</label>
                                <div class="relative">
                                    <input type="password" id="admin-pass" required minlength="4"
                                        class="w-full px-4 py-3 pr-11 rounded-xl border border-slate-300 secure-input outline-none transition-all text-slate-800"
                                        placeholder="Mínimo 4 caracteres">
                                    <button type="button" onclick="togglePassVisibility('admin-pass')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                        <i data-lucide="eye" class="w-5 h-5" id="eye-admin-pass"></i>
                                    </button>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-1.5">Confirmar contraseña</label>
                                <div class="relative">
                                    <input type="password" id="admin-pass-confirm" required minlength="4"
                                        class="w-full px-4 py-3 pr-11 rounded-xl border border-slate-300 secure-input outline-none transition-all text-slate-800"
                                        placeholder="Repite la contraseña">
                                    <button type="button" onclick="togglePassVisibility('admin-pass-confirm')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                        <i data-lucide="eye" class="w-5 h-5" id="eye-admin-pass-confirm"></i>
                                    </button>
                                </div>
                            </div>
                            ` : `
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-1.5">Contraseña</label>
                                <div class="relative">
                                    <input type="password" id="admin-pass" required autofocus
                                        class="w-full px-4 py-3 pr-11 rounded-xl border border-slate-300 secure-input outline-none transition-all text-slate-800"
                                        placeholder="Ingresa tu contraseña">
                                    <button type="button" onclick="togglePassVisibility('admin-pass')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                        <i data-lucide="eye" class="w-5 h-5" id="eye-admin-pass"></i>
                                    </button>
                                </div>
                            </div>
                            `}

                            <div id="login-error" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm p-3 rounded-xl"></div>

                            <button type="submit"
                                class="w-full bg-amber-500 hover:bg-amber-600 active:bg-amber-700 text-white font-bold py-3.5 px-6 rounded-xl transition-all flex items-center justify-center gap-2">
                                <i data-lucide="${isSetup ? 'shield-check' : 'unlock'}" class="w-5 h-5"></i>
                                ${isSetup ? 'Crear Contraseña' : 'Ingresar'}
                            </button>
                        </form>

                        <button onclick="closeLoginModal()" class="w-full mt-3 text-slate-400 hover:text-slate-600 text-sm font-medium py-2 transition-colors">
                            Cancelar
                        </button>
                    </div>
                </div>
            </div>
        `;

        lucide.createIcons();

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('login-error');
            const pass = document.getElementById('admin-pass').value;

            if (isSetup) {
                const passConfirm = document.getElementById('admin-pass-confirm').value;
                if (pass !== passConfirm) {
                    errorEl.textContent = 'Las contraseñas no coinciden';
                    errorEl.classList.remove('hidden');
                    document.getElementById('login-form').classList.add('shake');
                    setTimeout(() => document.getElementById('login-form').classList.remove('shake'), 500);
                    return;
                }
                if (pass.length < 4) {
                    errorEl.textContent = 'La contraseña debe tener al menos 4 caracteres';
                    errorEl.classList.remove('hidden');
                    return;
                }
                await AdminAuth.setPassword(pass);
                AdminAuth.login();
                closeLoginModal();
                showToast('Contraseña creada exitosamente', 'success');
                if (onSuccess) onSuccess();
            } else {
                const isValid = await AdminAuth.verifyPassword(pass);
                if (isValid) {
                    AdminAuth.login();
                    closeLoginModal();
                    showToast('Acceso concedido', 'success');
                    if (onSuccess) onSuccess();
                } else {
                    errorEl.textContent = 'Contraseña incorrecta';
                    errorEl.classList.remove('hidden');
                    document.getElementById('login-form').classList.add('shake');
                    setTimeout(() => document.getElementById('login-form').classList.remove('shake'), 500);
                }
            }
        };
    }

    function closeLoginModal() {
        const modalContainer = document.getElementById('modal-container');
        modalContainer.innerHTML = '';
    }

    function togglePassVisibility(inputId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById('eye-' + inputId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.setAttribute('data-lucide', 'eye-off');
        } else {
            input.type = 'password';
            icon.setAttribute('data-lucide', 'eye');
        }
        lucide.createIcons();
    }

    // Require admin access
    function requireAdmin(callback) {
        if (AdminAuth.isLoggedIn()) {
            callback();
        } else if (!AdminAuth.hasPassword()) {
            showLoginModal(callback, 'setup');
        } else {
            showLoginModal(callback, 'login');
        }
    }

    // ====================================================
    // EMERGENCY VIEW (scanned via QR)
    // ====================================================
    function decodeProfileFromQR(data) {
        try {
            const json = decodeURIComponent(atob(data));
            const parsed = JSON.parse(json);
            if (!parsed || !parsed.name || !parsed.phone) return null;
            return parsed;
        } catch (e) {
            return null;
        }
    }

    function renderEmergencyView(profileId, qrData) {
        State.load();
        let profile = null;
        if (profileId) {
            profile = State.profiles.find(p => p.id === profileId);
        }
        if (!profile && qrData) {
            profile = decodeProfileFromQR(qrData);
        }
        const app = document.getElementById('app');

        if (!profile) {
            app.innerHTML = `
                <div class="min-h-screen flex items-center justify-center bg-red-50 p-6">
                    <div class="text-center fade-in">
                        <div class="w-20 h-20 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
                            <i data-lucide="alert-triangle" class="w-10 h-10 text-red-600"></i>
                        </div>
                        <h1 class="text-2xl font-bold text-red-800 mb-2">Perfil no encontrado</h1>
                        <p class="text-red-600">El código QR puede estar desactualizado o el perfil fue eliminado.</p>
                    </div>
                </div>
            `;
            lucide.createIcons();
            return;
        }

        const isPet = profile.type === 'pet';
        const typeLabel = isPet ? 'Mascota' : 'Persona';
        const typeIcon = isPet ? 'paw-print' : 'user';
        const photoHTML = profile.photo
            ? `<img src="${profile.photo}" alt="Foto" class="w-28 h-28 rounded-full object-cover border-4 border-white shadow-lg">`
            : `<div class="w-28 h-28 rounded-full bg-white/20 flex items-center justify-center border-4 border-white/40">
                 <i data-lucide="${typeIcon}" class="w-14 h-14 text-white/80"></i>
               </div>`;

        const medicalHTML = profile.medicalNotes ? `
            <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 slide-up" style="animation-delay: 0.2s">
                <div class="flex items-center gap-2 mb-2">
                    <i data-lucide="heart-pulse" class="w-5 h-5 text-amber-600"></i>
                    <h3 class="font-bold text-amber-800">Información Médica</h3>
                </div>
                <p class="text-amber-900 text-sm leading-relaxed">${escapeHTML(profile.medicalNotes)}</p>
            </div>` : '';

        const addressHTML = profile.address ? `
            <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 slide-up" style="animation-delay: 0.25s">
                <div class="flex items-center gap-2 mb-1">
                    <i data-lucide="map-pin" class="w-5 h-5 text-blue-600"></i>
                    <h3 class="font-bold text-blue-800">Dirección</h3>
                </div>
                <p class="text-blue-900 text-sm">${escapeHTML(profile.address)}</p>
            </div>` : '';

        const petOwnerHTML = isPet && profile.ownerName ? `
            <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 slide-up" style="animation-delay: 0.15s">
                <div class="flex items-center gap-2 mb-1">
                    <i data-lucide="user" class="w-5 h-5 text-slate-600"></i>
                    <h3 class="font-bold text-slate-800">Dueño/a</h3>
                </div>
                <p class="text-slate-900 font-medium">${escapeHTML(profile.ownerName)}</p>
            </div>` : '';

        const petDetailsHTML = isPet ? `
            ${profile.breed ? `<div class="flex justify-between py-2 border-b border-slate-100">
                <span class="text-slate-500 text-sm">Raza</span>
                <span class="text-slate-800 font-medium text-sm">${escapeHTML(profile.breed)}</span>
            </div>` : ''}
            ${profile.color ? `<div class="flex justify-between py-2 border-b border-slate-100">
                <span class="text-slate-500 text-sm">Color</span>
                <span class="text-slate-800 font-medium text-sm">${escapeHTML(profile.color)}</span>
            </div>` : ''}
            ${profile.weight ? `<div class="flex justify-between py-2">
                <span class="text-slate-500 text-sm">Peso</span>
                <span class="text-slate-800 font-medium text-sm">${escapeHTML(profile.weight)}</span>
            </div>` : ''}
        ` : '';

        const bloodTypeHTML = !isPet && profile.bloodType ? `
            <div class="flex justify-between py-2 border-b border-slate-100">
                <span class="text-slate-500 text-sm">Tipo de Sangre</span>
                <span class="text-slate-800 font-bold text-sm bg-red-50 px-3 py-0.5 rounded-full text-red-700">${escapeHTML(profile.bloodType)}</span>
            </div>` : '';

        const allergiesHTML = profile.allergies ? `
            <div class="bg-red-50 border border-red-200 rounded-xl p-4 slide-up" style="animation-delay: 0.3s">
                <div class="flex items-center gap-2 mb-2">
                    <i data-lucide="shield-alert" class="w-5 h-5 text-red-600"></i>
                    <h3 class="font-bold text-red-800">Alergias</h3>
                </div>
                <p class="text-red-900 text-sm leading-relaxed">${escapeHTML(profile.allergies)}</p>
            </div>` : '';

        app.innerHTML = `
            <div class="min-h-screen bg-white">
                <!-- Header -->
                <div class="bg-gradient-to-br from-red-600 via-red-700 to-red-800 text-white pt-10 pb-16 px-6 text-center relative overflow-hidden">
                    <div class="absolute inset-0 opacity-10">
                        <div class="absolute top-4 left-4 w-32 h-32 border border-white/30 rounded-full"></div>
                        <div class="absolute bottom-4 right-4 w-48 h-48 border border-white/20 rounded-full"></div>
                    </div>
                    <div class="relative z-10">
                        <div class="flex items-center justify-center gap-2 mb-4">
                            <i data-lucide="shield-check" class="w-5 h-5"></i>
                            <span class="text-xs font-bold uppercase tracking-[0.2em] text-red-200">Ficha de Emergencia</span>
                        </div>
                        <div class="flex justify-center mb-4 fade-in">
                            ${photoHTML}
                        </div>
                        <h1 class="text-3xl font-black tracking-tight fade-in">${escapeHTML(profile.name)}</h1>
                        <div class="inline-flex items-center gap-1.5 mt-2 bg-white/15 px-3 py-1 rounded-full text-sm font-medium">
                            <i data-lucide="${typeIcon}" class="w-4 h-4"></i>
                            ${typeLabel}
                        </div>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="px-5 -mt-8 pb-8 space-y-4 relative z-10">

                    <!-- Emergency Call Buttons -->
                    <div class="bg-white rounded-2xl shadow-lg shadow-slate-200/60 border border-slate-100 p-4 slide-up">
                        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 flex items-center gap-1.5">
                            <i data-lucide="phone" class="w-3.5 h-3.5"></i> Contacto de Emergencia
                        </h2>
                        <a href="tel:${escapeHTML(profile.phone)}"
                           class="flex items-center gap-3 bg-green-600 hover:bg-green-700 active:bg-green-800 text-white font-bold py-4 px-5 rounded-xl transition-all emergency-pulse mb-3 w-full">
                            <i data-lucide="phone-call" class="w-6 h-6 shrink-0"></i>
                            <div class="text-left">
                                <div class="text-xs text-green-200 font-medium">${isPet ? 'Llamar al dueño' : 'Contacto principal'}</div>
                                <div class="text-lg">${escapeHTML(profile.phone)}</div>
                            </div>
                        </a>

                        ${profile.phoneAlt ? `
                        <a href="tel:${escapeHTML(profile.phoneAlt)}"
                           class="flex items-center gap-3 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3 px-5 rounded-xl transition-all mb-3 w-full">
                            <i data-lucide="phone" class="w-5 h-5 shrink-0"></i>
                            <div class="text-left">
                                <div class="text-xs text-blue-200 font-medium">Contacto alternativo</div>
                                <div>${escapeHTML(profile.phoneAlt)}</div>
                            </div>
                        </a>` : ''}

                        <div class="grid grid-cols-2 gap-2">
                            <a href="tel:911"
                               class="flex items-center justify-center gap-2 bg-red-700 hover:bg-red-800 active:bg-red-900 text-white font-bold py-3 px-4 rounded-xl transition-all">
                                <i data-lucide="siren" class="w-5 h-5"></i>
                                <span>911</span>
                            </a>
                            <a href="tel:065"
                               class="flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-bold py-3 px-4 rounded-xl transition-all">
                                <i data-lucide="cross" class="w-5 h-5"></i>
                                <span>Cruz Roja</span>
                            </a>
                        </div>
                    </div>

                    <!-- Details Card -->
                    <div class="bg-white rounded-2xl shadow-lg shadow-slate-200/60 border border-slate-100 p-4 slide-up" style="animation-delay: 0.1s">
                        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 flex items-center gap-1.5">
                            <i data-lucide="clipboard-list" class="w-3.5 h-3.5"></i> Datos
                        </h2>
                        ${bloodTypeHTML}
                        ${petDetailsHTML}
                        ${petOwnerHTML}
                    </div>

                    ${medicalHTML}
                    ${allergiesHTML}
                    ${addressHTML}

                    <!-- Footer -->
                    <div class="text-center pt-4">
                        <p class="text-xs text-slate-400">Ficha generada por <span class="font-bold text-slate-500">ID Emergencia</span></p>
                        <p class="text-xs text-slate-300 mt-1">Datos almacenados localmente · Sin servidores externos</p>
                    </div>
                </div>
            </div>
        `;
        lucide.createIcons();
    }

    // ====================================================
    // REGISTRATION FORM
    // ====================================================
    function renderRegistration(editIndex = null) {
        const isEdit = editIndex !== null;
        const profile = isEdit ? State.profiles[editIndex] : null;
        const app = document.getElementById('app');

        app.innerHTML = `
            <div class="min-h-screen bg-gradient-to-b from-slate-50 to-white">
                <!-- Header -->

    function selectType(type) {
        window._selectedType = type;
        const btnPerson = document.getElementById('btn-person');
        const btnPet = document.getElementById('btn-pet');
        const petFields = document.getElementById('pet-fields');
        const personFields = document.getElementById('person-fields');
        const ownerField = document.getElementById('owner-field');

        // Reset styles
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.classList.remove('border-blue-500', 'bg-blue-50');
            btn.classList.add('border-slate-200', 'bg-white');
        });

        if (type === 'person') {
            btnPerson.classList.add('border-blue-500', 'bg-blue-50');
            btnPerson.classList.remove('border-slate-200', 'bg-white');
            petFields.classList.add('hidden');
            personFields.classList.remove('hidden');
            ownerField.classList.add('hidden');
        } else {
            btnPet.classList.add('border-blue-500', 'bg-blue-50');
            btnPet.classList.remove('border-slate-200', 'bg-white');
            petFields.classList.remove('hidden');
            personFields.classList.add('hidden');
            ownerField.classList.remove('hidden');
        }
    }

    function handlePhoto(input) {
        const file = input.files[0];
        if (!file) return;

        // Compress and convert to base64
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_SIZE = 300;
                let w = img.width, h = img.height;
                if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; } }
                else { if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; } }
                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                window._currentPhoto = canvas.toDataURL('image/jpeg', 0.7);

                const photoArea = document.getElementById('photo-preview-area');
                const photoContainer = document.getElementById('photo-area');
                photoArea.innerHTML = `<img src="${window._currentPhoto}" class="w-20 h-20 rounded-full object-cover mx-auto">
                    <p class="text-xs text-green-600 font-medium mt-2">Toca para cambiar</p>`;
                photoContainer.classList.add('has-photo');
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function handleSubmit(e, editIndex) {
        e.preventDefault();

        const data = {
            type: window._selectedType,
            name: document.getElementById('name').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            phoneAlt: document.getElementById('phoneAlt').value.trim(),
            address: document.getElementById('address').value.trim(),
            medicalNotes: document.getElementById('medicalNotes').value.trim(),
            allergies: document.getElementById('allergies').value.trim(),
            photo: window._currentPhoto || null
        };

        if (window._selectedType === 'pet') {
            data.ownerName = document.getElementById('ownerName').value.trim();
            data.breed = document.getElementById('breed').value.trim();
            data.color = document.getElementById('color').value.trim();
            data.weight = document.getElementById('weight').value.trim();
        } else {
            data.bloodType = document.getElementById('bloodType').value;
        }

        if (!data.name || !data.phone) {
            showToast('Completa los campos obligatorios', 'error');
            return;
        }

        if (editIndex !== null) {
            State.updateProfile(editIndex, data);
            State.activeProfileIndex = editIndex;
        } else {
            State.addProfile(data);
        }

        window._currentPhoto = null;
        renderDashboard();
        showToast(editIndex !== null ? 'Perfil actualizado' : 'Ficha creada exitosamente', 'success');
    }

    // ====================================================
    // EXPORT / IMPORT DATA
    // ====================================================
    function exportData() {
        const data = {
            version: '2.0',
            exportedAt: new Date().toISOString(),
            profiles: State.profiles
        };
        
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ID-Emergencia-Backup-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        
        showToast('Datos exportados', 'success');
    }

    function confirmImportData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                const text = await file.text();
                const data = JSON.parse(text);

                if (!data.profiles || !Array.isArray(data.profiles)) {
                    throw new Error('Formato inválido');
                }

                if (confirm(`Se encontraron ${data.profiles.length} perfiles.\n\n¿Deseas importarlos?\n\nNota: Los perfiles existentes con el mismo ID serán reemplazados.`)) {
                    // Merge profiles
                    data.profiles.forEach(newProfile => {
                        const existingIndex = State.profiles.findIndex(p => p.id === newProfile.id);
                        if (existingIndex >= 0) {
                            State.profiles[existingIndex] = newProfile;
                        } else {
                            State.profiles.push(newProfile);
                        }
                    });
                    State.save();
                    renderAdminPanel();
                    showToast(`${data.profiles.length} perfiles importados`, 'success');
                }
            } catch (err) {
                showToast('Error al importar: archivo inválido', 'error');
            }
        };
        input.click();
    }

    // ====================================================
    // UTILITY FUNCTIONS
    // ====================================================
    function escapeHTML(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function buildEmergencyURL(profileId) {
        const base = window.location.origin + window.location.pathname;
        return `${base}?view=emergency&id=${profileId}`;
    }

    function buildEmergencyURLWithData(profile) {
        const base = window.location.origin + window.location.pathname;
        const payload = {
            id: profile.id,
            type: profile.type,
            name: profile.name,
            ownerName: profile.ownerName || '',
            phone: profile.phone,
            phoneAlt: profile.phoneAlt || '',
            bloodType: profile.bloodType || '',
            allergies: profile.allergies || '',
            medicalNotes: profile.medicalNotes || '',
            address: profile.address || '',
            breed: profile.breed || '',
            color: profile.color || '',
            weight: profile.weight || '',
            photo: profile.photo || ''
        };
        const encoded = btoa(encodeURIComponent(JSON.stringify(payload)));
        return `${base}?view=emergency&data=${encoded}`;
    }

        State.activeProfileIndex = index;
        State.save();
        renderDashboard();

    function confirmDelete(index) {

    function setQRMode(mode) {
        const profile = State.getActive();
        if (!profile) return;
        const portableURL = buildEmergencyURLWithData(profile);
        const localURL = buildEmergencyURL(profile.id);
        const url = mode === 'local' ? localURL : portableURL;

        const btnPortable = document.getElementById('qr-mode-portable');
        const btnLocal = document.getElementById('qr-mode-local');
        const urlDisplay = document.getElementById('qr-url-display');
        if (btnPortable && btnLocal) {
            btnPortable.className = 'qr-mode-btn text-xs font-bold py-2 rounded-lg ' + (mode === 'portable' ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-700');
            btnLocal.className = 'qr-mode-btn text-xs font-bold py-2 rounded-lg ' + (mode === 'local' ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-700');
        }
        if (urlDisplay) {
            urlDisplay.textContent = url;
        }
        updateQRCode(portableURL, localURL, mode);
    }

    function updateQRCode(portableURL, localURL, mode = 'portable') {
        const qrContainer = document.getElementById('qr-display');
        if (qrContainer) {
            qrContainer.innerHTML = '';
            const url = mode === 'local' ? localURL : portableURL;
            new QRCode(qrContainer, {
                text: url,
                width: 200,
                height: 200,
                colorDark: '#1e293b',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }
    }

    function downloadQR() {
        const canvas = document.querySelector('#qr-display canvas');
        if (canvas) {
            const link = document.createElement('a');
            link.download = `QR-Emergencia-${State.getActive().name.replace(/\s+/g, '-')}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast('QR descargado', 'success');
        }
    }

    function printQR() {
        window.print();
    }

    function showToast(message, type = 'info') {
        const colors = {
            success: 'bg-green-600',
            error: 'bg-red-600',
            info: 'bg-slate-700'
        };

        const icons = {
            success: 'check-circle',
            error: 'alert-circle',
            info: 'info'
        };

        const toast = document.createElement('div');
        toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] ${colors[type]} text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-2 text-sm font-medium slide-up`;
        toast.innerHTML = `<i data-lucide="${icons[type]}" class="w-5 h-5"></i> ${message}`;
        document.body.appendChild(toast);
        lucide.createIcons();

        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, 2500);
    }

    // ====================================================
    // INIT
    // ====================================================
    function init() {
        State.load();
        const route = getRoute();

        if (route.view === 'emergency') {
            renderEmergencyView(route.id, route.data);
        } else if (State.hasProfiles()) {
            renderDashboard();
        } else {
            renderWelcome();
        }
    }

    // Wait for Lucide to load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    </script>
